      </text>

      <g transform="translate(0 140)">
        <g transform="translate(0 0)">
          <rect x="0" y="0" width="250" height="54" rx="18" fill="rgba(61,220,151,0.18)" stroke="rgba(61,220,151,0.55)" stroke-width="2"/>
          <text x="22" y="36" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="24" font-weight="700" fill="#ffffff">
            Haversine (km)
          </text>
        </g>
        <g transform="translate(272 0)">
          <rect x="0" y="0" width="236" height="54" rx="18" fill="rgba(0,180,216,0.16)" stroke="rgba(0,180,216,0.55)" stroke-width="2"/>
          <text x="22" y="36" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="24" font-weight="700" fill="#ffffff">
            Pearson (r)
          </text>
        </g>
        <g transform="translate(530 0)">
          <rect x="0" y="0" width="238" height="54" rx="18" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
          <text x="22" y="36" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="24" font-weight="700" fill="#ffffff">
            Heatmaps
          </text>
        </g>
      </g>
    </g>

    <g opacity="0.16">
      <circle cx="1040" cy="610" r="6" fill="#ffffff"/>
      <circle cx="1090" cy="640" r="4" fill="#ffffff"/>
      <circle cx="1180" cy="620" r="5" fill="#ffffff"/>
      <circle cx="1250" cy="655" r="4" fill="#ffffff"/>
      <circle cx="1310" cy="600" r="5" fill="#ffffff"/>
      <circle cx="1400" cy="640" r="4" fill="#ffffff"/>
      <circle cx="1460" cy="610" r="6" fill="#ffffff"/>
      <circle cx="1540" cy="650" r="4" fill="#ffffff"/>
      <circle cx="1610" cy="610" r="5" fill="#ffffff"/>
      <path d="M1040,610 L1180,620 L1310,600 L1460,610 L1610,610" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="6 10" stroke-linecap="round"/>
