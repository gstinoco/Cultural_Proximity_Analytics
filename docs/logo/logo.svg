<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="812" viewBox="0 0 2000 812">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1B3A"/>
      <stop offset="1" stop-color="#163B6B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3DDC97"/>
      <stop offset="1" stop-color="#00B4D8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="cardClip">
      <rect x="140" y="120" width="1720" height="572" rx="40" ry="40"/>
    </clipPath>
  </defs>

  <rect width="2000" height="812" fill="url(#bg)"/>

  <g opacity="0.20">
    <path d="M0,560 C220,470 420,720 640,600 C860,480 1040,710 1260,590 C1480,470 1660,650 2000,520 L2000,812 L0,812 Z" fill="#ffffff"/>
    <path d="M0,640 C240,520 450,820 690,660 C930,500 1120,790 1360,640 C1600,490 1760,740 2000,610 L2000,812 L0,812 Z" fill="#ffffff" opacity="0.55"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="140" y="120" width="1720" height="572" rx="40" ry="40" fill="#0A162F" opacity="0.60"/>
    <rect x="140" y="120" width="1720" height="572" rx="40" ry="40" fill="rgba(255,255,255,0.04)"/>
    <rect x="140" y="120" width="1720" height="572" rx="40" ry="40" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  </g>

  <g clip-path="url(#cardClip)">
    <g opacity="0.18">
      <circle cx="1550" cy="235" r="190" fill="none" stroke="#ffffff" stroke-width="2"/>
      <circle cx="1550" cy="235" r="120" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
      <circle cx="1550" cy="235" r="60" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
      <path d="M1360,235 H1740" stroke="#ffffff" stroke-width="2" opacity="0.45"/>
      <path d="M1550,45 V425" stroke="#ffffff" stroke-width="2" opacity="0.45"/>
    </g>

    <g transform="translate(240 210)">
      <g filter="url(#glow)">
        <path d="M260,78 C260,26 218,-16 166,-16 C114,-16 72,26 72,78 C72,178 166,290 166,290 C166,290 260,178 260,78 Z" fill="url(#accent)"/>
        <circle cx="166" cy="84" r="46" fill="#0B1B3A" opacity="0.92"/>
        <circle cx="166" cy="84" r="18" fill="#ffffff" opacity="0.92"/>
      </g>

      <g transform="translate(330 12)">
        <path d="M0,210 C170,170 260,250 440,210 C620,170 720,250 900,210" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="6" stroke-linecap="round"/>
        <circle cx="120" cy="188" r="10" fill="#ffffff" opacity="0.7"/>
        <circle cx="360" cy="220" r="10" fill="#ffffff" opacity="0.7"/>
        <circle cx="620" cy="190" r="10" fill="#ffffff" opacity="0.7"/>

        <path d="M120,188 L360,220 L620,190" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="4" stroke-dasharray="8 10" stroke-linecap="round"/>
      </g>
    </g>

    <g transform="translate(600 230)">
