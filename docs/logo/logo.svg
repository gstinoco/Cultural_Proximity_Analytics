        Cultural Proximity Analytics
      </text>
      <text x="0" y="74" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="34" font-weight="600" fill="rgba(255,255,255,0.82)">
